  <main id="main">

    <!-- ===================== HERO ===================== -->
    <section class="hero" id="top" aria-label="Introduction">
      <div class="hero-inner">
        <p class="eyebrow" data-reveal>Software Studio</p>

        <h1 class="hero-logo" id="hero-logo" data-reveal tabindex="0" aria-label="Sanolen">
          <span class="hero-logo-text">Sanolen</span>
        </h1>

        <p class="tagline" data-reveal>Building software that deserves to exist.</p>

        <div class="cycling-wrap" data-reveal>
          <p class="cycling-text" id="cycling-text" aria-live="polite"></p>
        </div>
      </div>

      <button class="scroll-indicator" id="scroll-indicator" aria-label="Scroll to products">
        <span class="scroll-mouse"><span class="scroll-dot"></span></span>
        <span class="scroll-label">Scroll</span>
      </button>
    </section>

    <!-- ===================== PRODUCTS ===================== -->
    <section class="products" id="products" aria-label="Products">
      <div class="section-heading" data-reveal>
        <p class="eyebrow">Currently In Progress</p>
        <h2>What we're building</h2>
        <p class="section-sub">Two products, quietly taking shape. More will follow.</p>
      </div>

      <div class="product-grid" id="product-grid" role="list">
        <!-- Cards are injected by script.js from the products array -->
      </div>
    </section>

  </main>
